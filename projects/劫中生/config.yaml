version: "1.0"
worldSetting:
  name: 劫中生
  genre: 仙侠
  worldBackground: 世间万物被时序丝线束缚，过去、现在、未来彼此纠缠，一举一动都会埋下因果伏笔，前世因造就今世果，轮回往复无法轻易挣脱
  era: 架空世界
  powerSystem: 炼气、筑基、金丹、元婴、化神、渡劫、大乘、飞升
  socialStructure: 凡尘凡域 宗门 仙域 仙途 时间长河，每个人都为了自己的理想和欲望奋斗
  geography: 时间长河 凡尘凡域 宗门 仙途 仙路 世界边界
  rules:
    - 待世界设定书生成后确定
  tone: 悲壮、热血、永不妥协的精神和团结
  themes:
    - 成长
    - 不屈
    - 守护
characters:
  - name: 李豪杰 一个充满求知的少年
    role: 主角
    description: 对任何的事物充满好奇，心思细腻善于观察，不争强好胜，也不怯懦退缩，遵从本心，稳步向道
    personality: 待定
    background: 待定
    arc: 从平凡到非凡的成长之旅
  - name: 一、
    role: 主要配角
    description: 宿命悲情类（为爱/为义/为执念，天生BE美学）殷棠 (男) ——
      替身白月光背景：天生仙骨的修仙奇才，是宗门大师兄，也是所有人眼中未来的飞升者。被魔尊所困后，人们才发现他只是个没有七情、被宗门炼化来承载“仙骨”的容器。特点：俊美如画，眉心一点朱砂痣，美得不像真人。他完美到令人恐惧，因为那不是修为，而是“设定”。他的记忆、感情甚至微笑，都是被写入的程式。作用：主角发现真相后，是要救他成为真正的人，还是为了天下大义毁掉他？他的存在拷问着何为“真实”。姜念
      (女) ——
      被遗忘的守护灵背景：上古剑神之女，为守护苍生炼成剑灵，沉睡了万年。被主角意外唤醒后，她忘却了前尘，像个小女孩一样跟在主角身边。特点：平日里是个天真烂漫的吃货，最爱冰糖葫芦。一旦主角握住她本体（一把断剑），她便会化身为冷漠无情的“剑神”，战力拉满，但每次使用都会消耗她的灵魂。作用：主角是让她成为一个真正的人，还是为了力量让她彻底消散？她遗忘的过去里，藏着打败最终BOSS的唯一方法。长渊
      (男) ——
      被囚禁的上古罪龙背景：上古龙族最后一位龙皇，因背叛天道被囚禁在无间深渊万年，枷锁穿骨。特点：外表是清冷出尘的谪仙，一头银发如瀑，瞳孔是竖起的金色。实则因长期孤寂已接近疯狂，言语间带着危险的偏执。作用：主角为救人或寻宝闯入深渊，成了他与外界唯一的联系。他会用自己的知识引诱主角做任何事，只为换取自由。他是毁天灭地的灾难，还是被逼疯的英雄？云萝
      (女) ——
      纸人新娘背景：冥婚习俗中，被许配给鬼王的纸扎新娘。因一缕执念化妖，穿着褪色的嫁衣，行走于阴阳两界。特点：她脸色惨白如纸，关节分明是纸做的，笑起来嘴角会裂开。她害怕火焰，行动时发出沙沙声。作用：擅长诅咒与幻术，情报灵通。她渴望成为一个真正的“人”，体验心跳和温度。她可以帮助主角，但每一次帮助，都可能让她的纸身更接近燃烧殆尽。二、
      疯批美人类（又爱又怕，危险又迷人）谢怜舟 (男) ——
      病弱医仙背景：天医谷谷主，号称能活死人肉白骨，自己却是个药罐子，常年坐在轮椅上，脸色苍白得可怕。特点：说话温柔，笑容和煦，让人如沐春风。但他看人的眼神不像在看病人，更像在看一块块完美的实验材料。作用：他会笑着对主角说“你的心脉很适合做药引”。他救主角十次，只为在第十一次时，从主角身上取走他想要的东西。他是主角最不敢得罪的盟友。凤九歌
      (女) ——
      傀儡师背景：傀儡宗宗主，曾是天机阁的千金，全族被灭后，用仇人的尸骨炼成了如今的傀儡大军。特点：容貌冶艳，媚骨天成，笑声如银铃般动听。她最喜欢把强大的生灵炼成傀儡，美其名曰“收藏”。作用：她对主角感兴趣，不是因为爱，而是想把主角炼成她最完美的收藏品。她会帮主角，但主角必须时刻警惕，自己是不是正在走进她的傀儡线阵。墨无痕
      (男) ——
      影卫背景：从小被当做死士培养，没有名字，只有代号“零”。在执行最后一次暗杀任务后，他发现自己要杀的人，正是自己的亲哥哥。特点：俊美而阴郁，像一把藏在刀鞘里的利刃。他从不主动说话，但模仿能力极强，能完美扮演任何角色。作用：他曾试图杀死主角，失败后被主角收留。他不懂感情，像一面镜子映照着主角的喜怒哀乐。当他第一次为了主角违背命令时，就是他真正“活着”的开始。白鹿
      (女) ——
      失忆的圣女背景：圣洁的白鹿族圣女，因遭人陷害失去记忆，变成了只会说“咩”的白鹿。特点：平日里是一只通体雪白、眼睛像红宝石的小鹿，温顺可爱。化为人形时是个懵懂少女，但她的眼泪有活死人肉白骨的功效。作用：主角需要她的眼泪救命，于是开始了漫长的养鹿（哄她开心）之旅。她的身世和失忆之谜，是各方势力争夺的关键。三、
      反差萌/忠犬类（意想不到的反转魅力）秦苍 (男) ——
      佛子魔心背景：大雷音寺的佛子，年少成名的佛修天才，被誉为“佛陀转世”。特点：宝相庄严，悲天悯人，行走间步步生莲。但他修的不是慈悲道，而是“红尘炼心”。作用：他帮助主角，是为了在主角身上体验“情”为何物。他的每一次帮助，都在把他拉下神坛。当佛子动了凡心，他会选择放弃修为，还是放弃主角？苏小棠
      (女) ——
      毒萝莉背景：万毒宗宗主的外孙女，被整个宗门宠大的小公主。外表是八九岁模样，实则已经八十多岁（对于她的种族来说还算幼崽）。特点：扎着双丸子头，喜欢吃糖葫芦，笑起来有两个小酒窝。但她身上的毒比糖还甜，随便摸一下，就可能中毒。作用：她是行走的“生化武器”，也是主角的强力后盾。她可以为了主角一句话，去毒翻整个反派大本营。她最讨厌别人摸她的头，碰者死。夜溟
      (男) ——
      失忆的魔尊背景：曾经的魔界至尊，因渡劫失败失忆，被主角捡到，成了主角的“小跟班”。特点：醒来时武力值为零，但理论知识满分。他能一眼看穿敌人的功法弱点，却连只鸡都杀不死。作用：他是主角的“百科全书”，负责出谋划策。随着实力恢复，他的记忆也开始复苏。他曾经是主角的敌人，现在却成了主角最忠诚的朋友。当记忆恢复，他会反水，还是选择继续留在主角身边？烛阴
      (男) ——
      社恐龙君背景：东海龙宫的三太子，拥有上古应龙血脉，实力深不可测。特点：外表是冷酷的冰山美人，实则是个重度社恐。他害怕与人交流，甚至连说话都结巴。他最大的爱好是宅在龙宫看话本子（小说）。作用：主角需要他帮忙打架，他就躲在主角身后瑟瑟发抖。主角需要用他的龙血救人，他一边哭一边割腕。他的龙宫藏书上万卷，主角想要的情报都在那些话本子里。四、
      高阶配置：直接给你几组化学反应拉满的“配角团”你可以考虑让这些角色产生互动，他们的组合往往比单个角色更有魅力：第一组：「神之队」女帝云苍
      (失忆后是吃货) + 剑灵姜念 (失忆后是呆萌) + 魔尊夜溟
      (失忆后是小白兔)看点：三个失忆大佬的冒险日常。他们自己都不知道自己有多强，经常在不经意间摧毁一切。为了争夺“谁先恢复记忆”而斗智斗勇，结果每次都是主角来收拾烂摊子。第二组：「反派的诱惑」医仙谢怜舟
      (病弱腹黑) + 傀儡师凤九歌 (妩媚疯批) + 影卫墨无痕
      (阴郁忠诚)看点：三足鼎立的危险联盟。他们对主角各有图谋，又互相牵制。每次他们同时出现，都意味着主角要有大麻烦了（或大机缘）。第三组：「暴娇三人组」凶兽苍猊
      (嘴硬心软) + 佛子秦苍 (表面慈悲) + 毒萝莉苏小棠
      (人畜无害)看点：全员口嫌体正直。嘴上说着“我才不帮你”，身体却比谁都诚实。他们是主角最强大的后盾，也是最让人头疼的麻烦制造机。
    personality: 待定
    background: 待定
    arc: 待定
writingStyle:
  perspective: 第三人称有限视角
  tense: 过去时
  proseStyle: 朴实细腻，人物刻画仔细，伏笔严谨
  chapterLength: 3704
  dialogueRatio: 30%-40%
plotFramework:
  mainConflict: 随着漫长岁月的流转，时光的流逝，这个宇宙世界正在慢慢的枯萎，主角团们需要集思广义，克服道路上的种种问题
  incitingIncident: 主角在一次次的冒险中开始了解这个世界，并改良和创新功法，神通以及道的运用
  climax: 宇宙世界都在创世和灭世，宇宙世界越拉越大导致主角现在的是最后一次宇宙创新，主角需要集结以往的世界的力量，对抗破灭劫运
  resolution: 主角团们用了很长时间才阻挡破灭劫运，虽然剩下的人只有之前的 万分之一，但宇宙不再破灭，开始涌现生机
  subplots:
    - 主角影响过去
    - 发现未来无法改变
    - 上个世界的人留下传承
  arcs:
    - arcIndex: 0
      title: 枯萎初现篇
      volumeRange:
        start: 1
        end: 4
      summary: 主角初入江湖，游历四方时察觉到天地灵气正在莫名衰退，万物生机渐失。在一次次与诡异枯竭现象的斗争中，主角不满足于旧有修行体系，开始尝试改良功法以适应日益严峻的环境。
      subConflict: 传统守旧势力与主角革新理念之间的冲突，以及日益恶化的自然环境威胁。
      keyCharacters:
        - 主角
        - 初代导师
        - 守旧宗门长老
      climax: 主角在一次针对枯萎兽潮的大战中，首次当众使用了自创的适应枯萎环境的全新神通，力挽狂澜。
      resolution: 主角初步证明了创新的重要性，获得了部分支持，但也引起了守旧势力的警惕。
      connectsTo: 主角在击退兽潮后，于废墟深处发现了一处不属于当前时代的遗迹，暗示了世界危机的周期性。
    - arcIndex: 1
      title: 上古遗秘篇
      volumeRange:
        start: 5
        end: 9
      summary: 主角深入探索神秘遗迹，发现了上个纪元文明留下的传承。通过解读古籍，主角了解到宇宙世界并非永恒，而是在不断创世与灭世中轮回膨胀，且每一纪元都比上一纪元更宏大但也更脆弱。
      subConflict: 遗迹守护者的试炼，以及试图抢夺上古秘宝的恶势力的阻挠。
      keyCharacters:
        - 遗迹守护者
        - 上古残魂
        - 宿敌
      climax: 主角在遗迹核心与宿敌对决，并在危急时刻融合了上古传承，突破自身极限，获得了窥探时间长河的能力。
      resolution: 主角成功继承上古意志，确立了拯救世界的使命感，并组建了最初的核心团队。
      connectsTo: 传承中提到改变过去或许能拯救现在，主角萌生了逆流岁月的念头，开启了对时空法则的探索。
    - arcIndex: 2
      title: 逆命因果篇
      volumeRange:
        start: 10
        end: 14
      summary: 主角利用获得的能力尝试干涉过去的关键节点，希望阻止世界枯萎的源头。然而在这一过程中，主角痛苦地发现未来是一条无法改变的死路，任何对过去的细微修改都会通过蝴蝶效应加速现在的崩溃。
      subConflict: 主角试图逆天改命与宇宙铁律（因果律）之间的激烈冲突。
      keyCharacters:
        - 时间行者
        - 神秘观测者
        - 主角心魔
      climax: 主角强行施展大神通回溯千年前试图挽救一场灾难，结果导致时空反噬，反而目睹了世界崩溃的倒计时提前启动。
      resolution: 主角彻底放弃改变过去的执念，领悟到“唯一的未来就在当下”，心境蜕变，道法大成。
      connectsTo: 既然过去不可改，主角意识到必须要在当下的最后时刻集结所有力量，准备迎接即将到来的终极劫运。
    - arcIndex: 3
      title: 诸界归一篇
      volumeRange:
        start: 15
        end: 19
      summary: 宇宙膨胀导致边界破碎，异域空间与现世开始融合，混乱加剧。主角团开始纵横各大星域，传播改良后的修行法门，联合万族，集结过往世界的残余力量，组建“救世联军”。
      subConflict: 不同种族与文明间的利益纠葛，以及破灭劫运化身的前哨部队的侵袭。
      keyCharacters:
        - 万族盟主
        - 异界强者
        - 军师
      climax: 主角主持召开“万道大会”，以无敌之姿镇压异见者，成功统一诸界意志，构建起覆盖全宇宙的防御大阵雏形。
      resolution: 诸界力量达成空前的统一，资源开始集中调配，为最后的决战奠定了物质基础。
      connectsTo: 防御大阵刚一建成，真正的“破灭劫运”本体降临，宇宙边缘开始彻底崩塌，最终战役拉开序幕。
    - arcIndex: 4
      title: 末世终焉篇
      volumeRange:
        start: 20
        end: 24
      summary: 宇宙进入了最后的创世与灭世震荡期，天地崩塌，法则混乱。主角团率领联军在破碎的虚空中与破灭劫运进行殊死搏斗，这是宇宙最后的创新机会，也是毁灭前的最后挣扎。
      subConflict: 救世联军与灭世天道的全面战争，以及内部关于牺牲少部分保全大部分的道德挣扎。
      keyCharacters:
        - 劫运化身
        - 核心团队成员
        - 悲情英雄
      climax: 联军防线全面崩溃，主角在绝境中献祭了自身的部分本源，激活了“归根复命”大阵，短暂冻结了时空，为最后的反击争取了一线生机。
      resolution: 虽然损失惨重，但成功困住了劫运本体，主角团准备好进行最后的孤注一掷。
      connectsTo: 大阵即将失效，主角必须在下一刻完成最后的宇宙创新，否则一切将归于虚无。
    - arcIndex: 5
      title: 创世重光篇
      volumeRange:
        start: 25
        end: 27
      summary: 全篇大结局。主角集结了所有过往世界的力量与众生意志，进行了前所未有的宇宙创新。在剧烈的能量爆发中，旧的秩序被粉碎，新的秩序在废墟中建立。
      subConflict: 维持新生宇宙的稳定与彻底抹除劫运痕迹的终极博弈。
      keyCharacters:
        - 主角
        - 幸存者
        - 新世界意志
      climax: 主角以身合道，将破灭劫运转化为新宇宙的基石，完成了最后一次宇宙创新，重启了天地生机。
      resolution: 破灭劫运被阻挡，宇宙不再扩大而是趋于内敛稳固。虽然幸存者仅余万分之一，但新世界涌现出前所未有的勃勃生机。
      connectsTo: 故事结束，新的纪元开启，幸存的主角团成员在废墟上仰望星空，展望未来。
targetLength: 2000000
